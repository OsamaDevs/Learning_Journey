<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Page</title>
    <style>
        /* Basic styling to make it look clean */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            font-size: 16px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        h1 {
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <label for="nameInput">What is your name?</label><br><br>
        <input type="text" id="nameInput" placeholder="Enter your name here">
        <button onclick="displayGreeting()">Say Hello</button>

        <h1 id="greetingText"></h1>
    </div>

    <script>
        // The JavaScript function that handles the logic
        function displayGreeting() {
            // Get the value typed into the input field
            const userName = document.getElementById("nameInput").value;
            const greetingElement = document.getElementById("greetingText");

            // Check if the user actually typed something
            if (userName.trim() !== "") {
                greetingElement.textContent = "Hello " + userName + "!";
            } else {
                greetingElement.textContent = "Please enter a name first!";
            }
        }
    </script>

</body>
</html>
